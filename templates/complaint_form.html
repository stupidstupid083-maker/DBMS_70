{% extends "base.html" %}
{% block title %}Submit Complaint - SmartHostel{% endblock %}
{% block content %}
<div class="form-page">
    <div class="form-card fade-in">
        <h2><i class="fas fa-pen-to-square"></i> Submit Complaint</h2>
        <form method="POST">
            <div class="form-group">
                <label><i class="fas fa-heading"></i> Title *</label>
                <input type="text" name="title" required placeholder="Brief complaint title">
            </div>
            <div class="form-group">
                <label><i class="fas fa-tags"></i> Category</label>
                <select name="category">
                    <option value="carpenter">🪚 Carpenter</option>
                    <option value="plumber">💧 Plumber</option>
                    <option value="electrician">🔌 Electrician</option>
                    <option value="wifi">📡 WiFi</option>
                    <option value="laundry">🧺 Laundry</option>
                    <option value="food">🍽️ Food</option>
                    <option value="security">🔒 Security</option>
                    <option value="cleanliness">🧹 Cleanliness</option>
                    <option value="other">📎 Other</option>
                </select>
            </div>
            <div class="form-group">
                <label><i class="fas fa-align-left"></i> Description *</label>
                <textarea name="description" rows="5" required
                    placeholder="Describe your complaint in detail..."></textarea>
            </div>
            <div class="form-actions">
                <a href="{{ url_for('complaint.list_complaints') }}" class="btn-outline">Cancel</a>
                <button type="submit" class="btn-primary"><i class="fas fa-paper-plane"></i> Submit</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
