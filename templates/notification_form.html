{% extends "base.html" %}
{% block title %}Send Notification - SmartHostel{% endblock %}
{% block content %}
<div class="form-page">
    <div class="form-card fade-in" style="max-width: 600px;">
        <h2><i class="fas fa-bell"></i> Send Notification</h2>
        <form method="POST">
            <div class="form-group">
                <label><i class="fas fa-bullseye"></i> Target</label>
                <select name="target">
                    <option value="all">📢 All Students (Broadcast)</option>
                    {% for s in students %}
                    <option value="{{ s.id }}">{{ s.full_name }} ({{ s.username }})</option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label><i class="fas fa-heading"></i> Title *</label>
                <input type="text" name="title" required placeholder="Notification title">
            </div>
            <div class="form-group">
                <label><i class="fas fa-align-left"></i> Message *</label>
                <textarea name="message" rows="3" required
                    placeholder="Write your notification message here..."></textarea>
            </div>

            <!-- Poll Feature -->
            <div class="poll-creator" style="margin-top: 1.5rem; padding: 1rem; background: rgba(255,255,255,0.03); border-radius: 8px; border: 1px dashed var(--glass-border);">
                <div class="form-check" style="margin-bottom: 1rem;">
                    <input class="form-check-input" type="checkbox" name="is_poll" id="is_poll" onchange="togglePollFields()">
                    <label class="form-check-label fw-bold" for="is_poll">
                        <i class="fas fa-square-poll-vertical text-primary"></i> Create as a Poll
                    </label>
                </div>
                <div id="poll-options-container" style="display: none;">
                    <label class="small text-muted mb-2">Poll Options (At least 2 required)</label>
                    <div id="options-list">
                        <div class="input-group mb-2">
                            <input type="text" name="poll_option" class="form-control bg-dark text-white border-0" placeholder="Option 1">
                        </div>
                        <div class="input-group mb-2">
                            <input type="text" name="poll_option" class="form-control bg-dark text-white border-0" placeholder="Option 2">
                        </div>
                    </div>
                    <button type="button" class="btn-outline btn-sm" onclick="addOption()">
                        <i class="fas fa-plus"></i> Add Option
                    </button>
                </div>
            </div>

            <div class="form-actions" style="margin-top: 2rem;">
                <a href="{{ url_for('notification.view') }}" class="btn-outline">Cancel</a>
                <button type="submit" class="btn-primary"><i class="fas fa-paper-plane"></i> Send</button>
            </div>
        </form>
    </div>
</div>

<script>
function togglePollFields() {
    const isChecked = document.getElementById('is_poll').checked;
    document.getElementById('poll-options-container').style.display = isChecked ? 'block' : 'none';
}

function addOption() {
    const list = document.getElementById('options-list');
    const idx = list.children.length + 1;
    const div = document.createElement('div');
    div.className = 'input-group mb-2';
    div.innerHTML = `<input type="text" name="poll_option" class="form-control bg-dark text-white border-0" placeholder="Option ${idx}">`;
    list.appendChild(div);
}
</script>
{% endblock %}
