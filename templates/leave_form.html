{% extends "base.html" %}
{% block title %}Apply for Leave - SmartHostel{% endblock %}
{% block content %}
<div class="form-page">
    <div class="form-card fade-in">
        <h2><i class="fas fa-door-open"></i> Apply for Leave</h2>
        <form method="POST">
            <div class="form-row">
                <div class="form-group">
                    <label><i class="fas fa-calendar"></i> From Date *</label>
                    <input type="date" name="from_date" required>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-calendar"></i> To Date *</label>
                    <input type="date" name="to_date" required>
                </div>
            </div>
            <div class="form-group">
                <label><i class="fas fa-map-marker-alt"></i> Destination</label>
                <input type="text" name="destination" placeholder="Where are you going?">
            </div>
            <div class="form-group">
                <label><i class="fas fa-align-left"></i> Reason *</label>
                <textarea name="reason" rows="4" required placeholder="Explain your reason for leave..."></textarea>
            </div>
            <div class="form-actions">
                <a href="{{ url_for('leave.list_leaves') }}" class="btn-outline">Cancel</a>
                <button type="submit" class="btn-primary"><i class="fas fa-paper-plane"></i> Submit Application</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
