{% extends "base.html" %}
{% block title %}Welcome to Abode{% endblock %}
{% block content %}

<div class="abode-landing-page" id="landingPage">
    <!-- Interactive House Hero -->
    <div class="landing-house-wrapper bounce-in">
        <svg width="340" height="340" viewBox="0 0 200 200" fill="none" class="hero-house-svg" id="heroHouse">
            <defs>
                <radialGradient id="houseGlow" cx="50%" cy="50%" r="50%">
                    <stop offset="0%" stop-color="#FFF5E1" stop-opacity="1"/>
                    <stop offset="100%" stop-color="#FFF5E1" stop-opacity="0"/>
                </radialGradient>
            </defs>
            
            <!-- Glowing Reveal inside (Scene 6) -->
            <rect x="40" y="50" width="120" height="130" fill="url(#houseGlow)" class="house-glow-effect"/>

            <!-- Static Base / Backing -->
            <path d="M30 90H170V180H30V90Z" fill="white" />
            <!-- Base Outline -->
            <rect x="30" y="90" width="140" height="90" fill="none" stroke="#1A1A1A" stroke-width="4"/>

            <!-- Roof -->
            <path d="M100 20L180 90H20L100 20Z" fill="var(--abode-pink)" stroke="#1A1A1A" stroke-width="4"/>

            <!-- Left Door Panel -->
            <g class="house-panel house-left" transform-origin="30 135">
                <rect x="30" y="90" width="70" height="90" fill="var(--abode-lavender)" stroke="#1A1A1A" stroke-width="4"/>
                <circle cx="90" cy="135" r="4" fill="#1A1A1A" />
            </g>

            <!-- Right Door Panel -->
            <g class="house-panel house-right" transform-origin="170 135">
                <rect x="100" y="90" width="70" height="90" fill="var(--abode-lavender)" stroke="#1A1A1A" stroke-width="4"/>
                <circle cx="110" cy="135" r="4" fill="#1A1A1A" />
            </g>
        </svg>
    </div>

    <h1 class="landing-welcome-text bounce-in" style="animation-delay: 0.2s;">Welcome to Abode</h1>

    <!-- Tap Hint -->
    <div class="tap-hint bounce-in" id="tapHint" style="animation-delay: 0.8s; margin-top: 3rem; font-size: 0.9rem; font-weight: 600; color: var(--text-3); opacity: 0.7; cursor: pointer;">
        Tap to Enter
    </div>
</div>

<style>
/* Revert landing page overrides */
body { background: white !important; overflow: hidden; }
.landing { padding: 0 !important; }
.landing-nav { display: none !important; }

.landing-tagline {
    font-family: 'Outfit', sans-serif;
}

.hero-house-svg {
    perspective: 1000px;
    transform-style: preserve-3d;
}

/* Base Pre-animation styles */
.house-glow-effect {
    opacity: 0;
    transition: opacity 0.8s ease-in-out;
}

/* Animations */
.anim-press {
    animation: pressEffect 120ms forwards;
}
.anim-split .house-left {
    animation: doorSplitLeft 600ms ease-in-out forwards;
}
.anim-split .house-right {
    animation: doorSplitRight 600ms ease-in-out forwards;
}
.anim-open .house-left {
    animation: doorOpenLeft 800ms cubic-bezier(0.65, 0, 0.35, 1) forwards !important;
}
.anim-open .house-right {
    animation: doorOpenRight 800ms cubic-bezier(0.65, 0, 0.35, 1) forwards !important;
}

.anim-exit {
    transform: scale(3);
    opacity: 0;
    transition: all 600ms ease-out;
}

@keyframes pressEffect {
    0% { transform: scale(1); }
    100% { transform: scale(0.96); }
}

@keyframes doorSplitLeft {
    0% { transform: translateX(0) rotateY(0deg); }
    100% { transform: translateX(-120px) rotateY(-35deg); }
}

@keyframes doorSplitRight {
    0% { transform: translateX(0) rotateY(0deg); }
    100% { transform: translateX(120px) rotateY(35deg); }
}

@keyframes doorOpenLeft {
    0% { transform: translateX(-120px) rotateY(-35deg); }
    100% { transform: translateX(-120px) rotateY(-85deg); }
}

@keyframes doorOpenRight {
    0% { transform: translateX(120px) rotateY(35deg); }
    100% { transform: translateX(120px) rotateY(85deg); }
}

</style>

<script>
    const wrapper = document.querySelector('.landing-house-wrapper');
    const svg = document.getElementById('heroHouse');
    const glow = document.querySelector('.house-glow-effect');
    const landingPage = document.getElementById('landingPage');
    let animating = false;

    // Automatic start after 1.5s, or allow tap
    const startSequence = () => {
        if (animating) return;
        animating = true;
        document.getElementById('tapHint').style.opacity = '0';
        
        // SCENE 3: Press Effect (0 -> 120ms)
        wrapper.classList.remove('bounce-in');
        wrapper.classList.add('anim-press');

        setTimeout(() => {
            // SCENE 4: Door Split (120ms -> 720ms)
            svg.classList.add('anim-split');
        }, 120);

        setTimeout(() => {
            // SCENE 5 & 6: Gate Opening & Light Reveal (720ms -> 1520ms)
            svg.classList.add('anim-open');
            glow.style.opacity = '1';
            landingPage.style.transition = 'background 0.8s ease';
            landingPage.style.background = 'linear-gradient(135deg, #FFF, #FDF2F7)';
        }, 720);

        setTimeout(() => {
            // SCENE 7: Transition to Login (1520ms -> 2120ms)
            wrapper.classList.add('anim-exit');
            landingPage.style.opacity = '0';
        }, 1520);

        setTimeout(() => {
            window.location.href = "{{ url_for('auth.login', role='student') }}";
        }, 2000); // Trigger page switch slightly before exit anim completely finishes
    };

    setTimeout(startSequence, 1500);
    landingPage.addEventListener('click', startSequence);
</script>

{% endblock %}
